# ---------------------------
# MySQL Database
# ---------------------------

spring.application.name=Banco-CRUD
spring.datasource.url=jdbc:${MYSQL.MYSQL_PUBLIC_URL:mysql://localhost:3306/banco?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${MYSQL.MYSQLUSER:root}
spring.datasource.password=${MYSQL.MYSQLPASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always

logging.level.root=WARN