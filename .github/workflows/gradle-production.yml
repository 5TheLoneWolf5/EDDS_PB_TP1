# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI Production with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    environment: "EDDS_PB_TP1 / production"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'

      # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
      # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle Wrapper
        run: ./gradlew build -i

  deploy:
    environment: "EDDS_PB_TP1 / production"
    needs: build
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      SVC_ID: ${{ vars.RAILWAY_PRODUCTION_SERVICE_ID }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Verify context
        run: railway status

      - uses: actions/checkout@v3
      - run: railway up --service=${{ env.SVC_ID }}

  zap_scan:
    environment: "EDDS_PB_TP1 / production"
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: read
      issues: write
    steps:
      - name: ZAP Scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: ${{ vars.PRODUCTION_URL }}

  front-end:
    needs: zap_scan
    uses: 5TheLoneWolf5/EDDS_PB_TP3/.github/workflows/main.yml@main
    with:
      SVC_ID: ${{ vars.RAILWAY_SERVICE_ID_FRONT_END }}
    secrets:
      API_KEY: ${{ secrets.FRONT_END_API_KEY }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_FROM_BACK_TO_FRONT_END }}

  selenium:
    environment: "EDDS_PB_TP1 / production"
    runs-on: ubuntu-latest
    needs: front-end
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Selenium E2E Tests
        run: ./gradlew seleniumTest -Dbaseurl=${{ vars.FRONT_END_URL }}
